name: Run Instagram Mass Reporter

on:
  # Allows you to manually click "Run workflow" from the Actions tab
  workflow_dispatch:

  # Automatically triggers the script on a schedule (e.g., every day at midnight UTC)
  schedule:
    - cron: '0 0 * * *'

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    # 1. Download the code from the repository
    - name: Checkout repository code
      uses: actions/checkout@v4

    # 2. Set up a Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Install the project's required packages
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Run the automation script with hidden account credentials
    # Replace 'main.py' with the actual execution script name if different
    - name: Execute Mass Reporter
      env:
        IG_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
        IG_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
      run: python main.py
